{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-7">
            <h3 class="mb-4 fw-bold">Datos de Envío 📦</h3>
            <form action="/finalizar" method="POST" id="form-compra">
                <div class="mb-3">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" name="nombre" class="form-control" required placeholder="Juan Pérez">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required placeholder="juan@ejemplo.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Teléfono / WhatsApp</label>
                    <input type="tel" name="telefono" class="form-control" required placeholder="11 1234 5678">
                </div>
                <div class="mb-3">
                    <label class="form-label">Dirección de Entrega</label>
                    <input type="text" name="direccion" class="form-control" required
                        placeholder="Calle Falsa 123, Tigre">
                </div>
                <div class="mb-3">
                    <label class="form-label">Código Postal (Opcional)</label>
                    <input type="text" name="cp" id="cp-destino" class="form-control" placeholder="1425">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Seleccioná tu Envío</label>
                    <div id="envio-opciones" class="mt-2">
                        <div class="text-center py-3">
                            <div class="spinner-border text-secondary" role="status">
                                <span class="visually-hidden">Cargando...</span>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" name="envio_tipo" id="envio_tipo">
                    <input type="hidden" name="envio_nombre" id="envio_nombre">
                    <input type="hidden" name="envio_precio" id="envio_precio" value="0">
                </div>
                <input type="hidden" name="carrito_data" id="carrito_input">
                <div class="mb-4 mt-4">
                    <label class="form-label fw-bold">Método de Pago</label>
                    <div class="border rounded p-3 bg-white">
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="radio" name="metodo_pago" id="pago_mp"
                                value="mercadopago" checked>
                            <label class="form-check-label w-100" for="pago_mp" style="cursor: pointer;">
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="fw-bold">Mercado Pago</span>
                                    <span class="badge bg-primary">Recomendado</span>
                                </div>
                                <small class="text-muted">Tarjetas de crédito, débito y efectivo.</small>
                            </label>
                        </div>
                        <hr class="my-2">
                        <div class="form-check mt-3">
                            <input class="form-check-input" type="radio" name="metodo_pago" id="pago_transf"
                                value="transferencia">
                            <label class="form-check-label w-100" for="pago_transf" style="cursor: pointer;">
                                <span class="fw-bold">Transferencia Bancaria</span>
                                <div class="small text-muted" id="transfer-desc-label">{{
                                    config.descuento_transferencia|int if config.descuento_transferencia % 1 == 0 else
                                    config.descuento_transferencia }}% de descuento</div>
                            </label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-fachero w-100 btn-lg mt-3" id="btn-confirmar" disabled>
                    PAGAR CON MERCADO PAGO
                </button>
            </form>
        </div>
        <div class="col-md-5">
            <div class="card bg-light border-0 shadow-sm p-3 mt-4 mt-md-0">
                <h4 class="fw-bold">Resumen</h4>
                <div id="resumen-items" class="small text-muted mb-3">
                </div>
                <!-- Sección de Cupón -->
                <div class="mb-3">
                    <div class="input-group input-group-sm">
                        <input type="text" id="input-cupon" class="form-control" placeholder="¿Tienes un cupón?">
                        <button class="btn btn-dark" type="button" id="btn-aplicar-cupon">Aplicar</button>
                    </div>
                    <div id="cupon-msg" class="extra-small mt-1"></div>
                    <input type="hidden" name="cupon_codigo" id="cupon_codigo_hidden">
                </div>
                <hr>
                <div class="d-flex justify-content-between">
                    <span class="fw-bold">Envío</span>
                    <span class="fw-bold">$<span id="envio-resumen">0</span></span>
                </div>
                <div class="d-flex justify-content-between mb-1" id="fila-descuento" style="display: none !important;">
                    <span class="text-success fw-bold">Descuento (<span id="cupon-pct">0</span>)</span>
                    <span class="text-success fw-bold">-$<span id="descuento-resumen">0</span></span>
                </div>
                <h3 class="fw-bold text-end mt-2">Total: $<span id="total-resumen">0</span></h3>
            </div>
        </div>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        // --- 1. SELECCIÓN DE ELEMENTOS DEL DOM ---
        const carritoInput = document.getElementById('carrito_input');
        const resumenDiv = document.getElementById('resumen-items');
        const btnCupon = document.getElementById('btn-aplicar-cupon');
        const inputCupon = document.getElementById('input-cupon');
        const cuponMsg = document.getElementById('cupon-msg');
        const cuponHidden = document.getElementById('cupon_codigo_hidden');
        const opcionesDiv = document.getElementById('envio-opciones');
        const btnConfirmar = document.getElementById('btn-confirmar');
        const radioMP = document.getElementById('pago_mp');
        const radioTransf = document.getElementById('pago_transf');
        const filaDescuento = document.getElementById('fila-descuento');
        const envioResumen = document.getElementById('envio-resumen');
        const totalResumen = document.getElementById('total-resumen');
        const cuponPctSpan = document.getElementById('cupon-pct');
        const descuentoResumen = document.getElementById('descuento-resumen');
        const envioPrecioHidden = document.getElementById('envio_precio');
        // --- 2. ESTADO INICIAL ---
        const carrito = localStorage.getItem('carrito') || '[]';
        carritoInput.value = carrito;
        const items = JSON.parse(carrito);
        let totalProductos = 0;
        let totalEnvio = 0;
        let descuentoPct = 0;
        const transferPctBase = {{ config.descuento_transferencia or 0 }};
        if (items.length === 0) {
            alert("El carrito está vacío, volvé a elegir productos.");
            window.location.href = "/productos";
            return;
        }
        // --- 3. RENDERIZACIÓN INICIAL DEL RESUMEN ---
        items.forEach(prod => {
            const subtotal = prod.precio * prod.cantidad;
            totalProductos += subtotal;
            resumenDiv.innerHTML += `
                <div class="d-flex justify-content-between">
                    <span>${prod.cantidad}x ${prod.nombre}</span>
                    <span>$${subtotal}</span>
                </div>
            `;
        });
        // --- 4. FUNCIONES DE CÁLCULO ---
        function renderTotales() {
            const descuentoPagoMonto = radioTransf.checked ? (totalProductos * (transferPctBase / 100)) : 0;
            const descuentoCuponMonto = totalProductos * (descuentoPct / 100);
            const totalFinal = (totalProductos - descuentoCuponMonto - descuentoPagoMonto) + totalEnvio;
            envioResumen.innerText = totalEnvio.toFixed(2);
            totalResumen.innerText = (totalFinal > 0 ? totalFinal : 0).toFixed(2);
            envioPrecioHidden.value = totalEnvio;
            const totalDescuento = descuentoCuponMonto + descuentoPagoMonto;
            if (totalDescuento > 0) {
                filaDescuento.style.setProperty('display', 'flex', 'important');
                let labels = [];
                if (descuentoPct > 0) labels.push(`Cupón ${descuentoPct}%`);
                if (radioTransf.checked && transferPctBase > 0) labels.push(`Transferencia ${transferPctBase}%`);
                cuponPctSpan.innerText = labels.join(' + ');
                descuentoResumen.innerText = totalDescuento.toFixed(2);
            } else {
                filaDescuento.style.setProperty('display', 'none', 'important');
            }
        }
        function actualizarBoton() {
            if (radioMP.disabled) return; // Si aún están cargando los envíos
            if (radioMP.checked) {
                btnConfirmar.innerText = 'PAGAR CON MERCADO PAGO';
            } else {
                btnConfirmar.innerText = 'CONFIRMAR PEDIDO';
            }
        }
        // --- 5. EVENT LISTENERS ---
        radioMP.addEventListener('change', () => {
            actualizarBoton();
            renderTotales();
        });
        radioTransf.addEventListener('change', () => {
            actualizarBoton();
            renderTotales();
        });
        btnCupon.addEventListener('click', async () => {
            const codigo = inputCupon.value.trim();
            if (!codigo) return;
            btnCupon.disabled = true;
            cuponMsg.innerText = "Validando...";
            cuponMsg.className = "extra-small mt-1 text-muted";
            try {
                const res = await fetch('/api/validar-cupon', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ codigo })
                });
                const data = await res.json();
                if (data.ok) {
                    descuentoPct = data.descuento;
                    cuponHidden.value = data.codigo;
                    cuponMsg.innerText = `¡Cupón ${data.codigo} aplicado!`;
                    cuponMsg.className = "extra-small mt-1 text-success fw-bold";
                    inputCupon.disabled = true;
                    btnCupon.style.display = 'none';
                    renderTotales();
                } else {
                    cuponMsg.innerText = data.error;
                    cuponMsg.className = "extra-small mt-1 text-danger";
                }
            } catch (e) {
                cuponMsg.innerText = "Error al validar cupón";
                cuponMsg.className = "extra-small mt-1 text-danger";
            } finally {
                btnCupon.disabled = false;
            }
        });
        // --- 6. CARGA DE ENVÍOS ---
        async function cargarEnvios() {
            try {
                const res = await fetch('/api/envios');
                const envios = await res.json();
                opcionesDiv.innerHTML = "";
                if (envios.length === 0) {
                    opcionesDiv.innerHTML = '<div class="alert alert-warning">No hay métodos de envío disponibles. Contactanos.</div>';
                    return;
                }
                envios.forEach(envio => {
                    const id = `envio-${envio.id}`;
                    opcionesDiv.innerHTML += `
                        <label class="w-100 border rounded p-3 mb-2 d-block" for="${id}" style="cursor:pointer;">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="fw-bold">${envio.nombre}</div>
                                </div>
                                <div class="fw-bold">$${envio.precio.toFixed(2)}</div>
                            </div>
                            <input class="form-check-input mt-2" type="radio" name="envio_radio" id="${id}" 
                                   value="${envio.id}" data-nombre="${envio.nombre}" data-precio="${envio.precio}" required />
                        </label>
                    `;
                });
                document.getElementsByName('envio_radio').forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        document.getElementById('envio_tipo').value = 'Personalizado';
                        document.getElementById('envio_nombre').value = e.target.getAttribute('data-nombre');
                        totalEnvio = parseFloat(e.target.getAttribute('data-precio'));
                        renderTotales();
                        btnConfirmar.disabled = false;
                    });
                });
            } catch (e) {
                console.error(e);
                opcionesDiv.innerHTML = '<div class="text-danger">Error cargando envíos. Recargá la página.</div>';
            }
        }
        // --- 7. EJECUCIÓN ---
        renderTotales();
        cargarEnvios();
    });
    document.getElementById('form-compra').addEventListener('submit', function () {
        localStorage.removeItem('carrito');
    });
</script>
{% endblock %}

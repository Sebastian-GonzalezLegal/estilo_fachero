{% extends 'base.html' %}

{% block content %}
<div class="container py-5 my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="display-1 fw-bold text-danger mb-3">500</div>
            <h2 class="fw-bold mb-4">Hubo un problema con la onda</h2>
            <p class="text-muted mb-5">Algo salió mal en nuestro servidor. Estamos trabajando para solucionarlo al
                toque. Por favor, intentá de nuevo en unos minutos.</p>
            <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center">
                <a href="/" class="btn btn-fachero px-5 py-3 rounded-pill shadow-sm">
                    VOLVER AL INICIO
                </a>
                <a href="{{ whatsapp_link }}" target="_blank" class="btn btn-outline-success px-5 py-3 rounded-pill">
                    <i class="bi bi-whatsapp me-2"></i>AVISAR POR WHATSAPP
                </a>
            </div>
            <div class="mt-5 pt-3">
                <i class="bi bi-gear-wide-connected text-muted opacity-25" style="font-size: 5rem;"></i>
            </div>
        </div>
    </div>
</div>
{% endblock %}

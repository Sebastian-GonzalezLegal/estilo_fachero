<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Estilo Fachero Admin</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            background-color: #1a1c1e;
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }
        .login-header img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin-bottom: 1rem;
        }
        .login-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            margin: 0;
            letter-spacing: -0.5px;
        }
        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(79, 93, 47, 0.1);
            border-color: #4F5D2F;
        }
        .btn-primary {
            background-color: #4F5D2F;
            border: none;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #3d4a24;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="login-card bg-white">
    <div class="login-header">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo">
        <h2>ESTILO FACHERO</h2>
        <p class="text-white-50 small mb-0 mt-2">Panel de Administración</p>
    </div>
    <div class="card-body p-4 p-sm-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else 'info' }} alert-dismissible fade show small" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">EMAIL</label>
                <input type="email" class="form-control" name="email" required autofocus placeholder="correo@ejemplo.com">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">CONTRASEÑA</label>
                <input type="password" class="form-control" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Ingresar al Panel</button>
            <div class="text-center">
                <a href="/" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Volver a la tienda</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
